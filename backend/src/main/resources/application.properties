spring.application.name=backend

server.port=${PORT:8080}

spring.mongodb.uri=${MONGODB_URI:mongodb://vigilant:vigilant@localhost:27017/vigilant?authSource=admin}

admin.username=${ADMIN_USERNAME:admin}
admin.password=${ADMIN_PASSWORD:changeme}

jwt.secret=${JWT_SECRET:change-this-secret-to-something-long-and-random}
jwt.expiration=${JWT_EXPIRATION:86400000}

cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost}
